version: '3.9'


services:
  frontend:
    build: ./frontend
    ports:
      - "3001:3000"

    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "5000:5000"

    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15


    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mydb

  
    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5


volumes:
  postgres_data:


